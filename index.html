<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#050510;color:#e5e7eb;font-family:system-ui,-apple-system,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
#app{width:100vw;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#gameArea{width:100%;max-width:480px;aspect-ratio:9/16;border-radius:24px;position:relative;overflow:hidden;box-shadow:0 0 80px rgba(124,58,237,.15),0 0 0 1px rgba(124,58,237,.2)}
canvas{display:block;width:100%;height:100%;border-radius:inherit}
.panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#e5e7eb;text-align:center;padding:20px;z-index:10}
.panel.hidden{display:none}
.panel h1{font-size:24px;background:linear-gradient(135deg,#f97316,#facc15);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.panel p{font-size:13px;color:#9ca3af;line-height:1.6}
.sub{font-size:13px;color:#9ca3af}
.sb{font-size:48px;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
button{border:none;border-radius:999px;padding:10px 28px;font-size:14px;font-weight:600;color:#111827;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
button:active{transform:scale(.95)}
.bs{background:linear-gradient(135deg,#f97316,#facc15);box-shadow:0 8px 30px rgba(249,115,22,.3)}
.bm{background:rgba(255,255,255,.08);color:#e5e7eb;border:1px solid rgba(255,255,255,.12)}
.bn{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 6px 20px rgba(34,197,94,.3);display:none}
.hud{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;font-size:13px;color:#f9fafb;text-shadow:0 1px 4px rgba(0,0,0,.9);pointer-events:none;z-index:5}
.hi{background:rgba(10,15,30,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:5px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.08)}
.tmr{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:5;font-size:22px;font-weight:700;color:#fbbf24;text-shadow:0 0 12px rgba(251,191,36,.4);pointer-events:none;font-variant-numeric:tabular-nums}
.hs{position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:5;background:rgba(239,68,68,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:5px 10px;border-radius:999px;border:1px solid rgba(239,68,68,.25);font-size:12px;color:#fca5a5;pointer-events:none;font-variant-numeric:tabular-nums}
.hs.hidden{display:none}
.sk-b{position:absolute;bottom:16px;right:16px;z-index:15;border:none;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,#7c3aed,#a78bfa);cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.4);-webkit-tap-highlight-color:transparent}
.sk-b.hidden{display:none}
.sk-h{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(124,58,237,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:5px 12px;border-radius:999px;font-size:13px;color:#ddd6fe;border:1px solid rgba(167,139,250,.2);pointer-events:none;z-index:5;font-variant-numeric:tabular-nums}
.sk-h.hidden{display:none}
.ver{font-size:11px;color:#4b5563;margin-top:2px;letter-spacing:.5px}
</style>
</head>
<body>
<div id="app">
<div id="gameArea">
<canvas id="game"></canvas>
<div class="hud" id="hud" style="display:none">
  <div class="hi">分数 <span id="sE" style="font-weight:700;color:#fbbf24">0</span></div>
  <div class="hi" id="lE">♥♥♥</div>
</div>
<div class="tmr" id="tmE" style="display:none"></div>
<div class="hs hidden" id="hsE">🏆 <span id="hsV">0</span></div>
<div class="sk-h hidden" id="skH">🛡 <span id="skC">0</span></div>
<button class="sk-b hidden" id="skB">🛡️ 无敌</button>
<div class="panel" id="stS">
  <h1>🍉 切水果</h1>
  <p>按住屏幕划过水果即可切开</p>
  <button class="bs" id="stB">开始游戏</button>
  <div class="ver">1.9版本</div>
</div>
<div class="panel hidden" id="goS">
  <div class="sub">游戏结束</div>
  <div class="sb" id="fsE">0</div>
  <div class="sub" id="oH">最高分: 0</div>
  <button class="bn" id="nhB">🎉 新纪录!</button>
  <button class="bs" id="rsB" style="margin-top:6px">再来一局</button>
  <button class="bm" id="mnB">返回主页</button>
</div>
</div>
</div>
<script>
var canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
var W=0,H=0,dpr=1;
function resize(){var r=canvas.parentElement.getBoundingClientRect();dpr=window.devicePixelRatio||1;canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);W=r.width;H=r.height;initStars();}
window.addEventListener('resize',resize);

/* ===== 水果类型 ===== */
var FT=[
  {n:'西瓜',e:'🍉',r:36,t:'wm'},
  {n:'橙子',e:'🍊',r:28,t:'og'},
  {n:'苹果',e:'🍎',r:28,t:'ap'},
  {n:'猕猴桃',e:'🥝',r:25,t:'ki'},
  {n:'柠檬',e:'🍋',r:26,t:'lm'},
  {n:'桃子',e:'🍑',r:28,t:'pc'}
];
var FC=FT.length,fC=[],iC=[],fScores=[];

/* ===== 绘制辅助 ===== */
function dSh(g,cx,cy,r){g.save();g.beginPath();g.ellipse(cx+2,cy+4,r*.93,r*.88,0,0,Math.PI*2);g.fillStyle='rgba(0,0,0,0.2)';g.fill();g.restore();}
function sHL(g,cx,cy,r,ox,oy,hr,cr,cg,cb,a){var x=cx+r*ox,y=cy+r*oy,h=g.createRadialGradient(x,y,0,x,y,Math.max(1,r*hr));h.addColorStop(0,'rgba('+cr+','+cg+','+cb+','+a+')');h.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0)');g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.fillStyle=h;g.fill();}
function rSt(g,cx,cy,r,c,w){g.beginPath();g.arc(cx,cy,Math.max(1,r-1),0,Math.PI*2);g.strokeStyle=c;g.lineWidth=w||1;g.stroke();}

/* ===== 西瓜 外观 ===== */
function dWMO(g,cx,cy,r){
  dSh(g,cx,cy,r);
  g.save();g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var bg=g.createRadialGradient(cx-r*.3,cy-r*.3,r*.08,cx+r*.1,cy+r*.1,r);
  bg.addColorStop(0,'#3aad58');bg.addColorStop(.35,'#2a8e42');bg.addColorStop(.7,'#1b6e30');bg.addColorStop(1,'#0e4c20');
  g.fillStyle=bg;g.fill();g.clip();
  g.lineWidth=5.5;
  for(var i=-6;i<=6;i++){g.beginPath();g.moveTo(cx+i*7.5,cy-r*1.1);g.bezierCurveTo(cx+i*7.5+2,cy-r*.3,cx+i*7.5-2,cy+r*.3,cx+i*7.5,cy+r*1.1);g.strokeStyle='rgba(6,38,16,0.5)';g.stroke();}
  g.lineWidth=4;
  for(var i=-5;i<=5;i++){g.beginPath();g.moveTo(cx+i*7.5+3.75,cy-r*1.05);g.bezierCurveTo(cx+i*7.5+5.5,cy-r*.3,cx+i*7.5+2,cy+r*.3,cx+i*7.5+3.75,cy+r*1.05);g.strokeStyle='rgba(80,180,95,0.13)';g.stroke();}
  for(var d=0;d<50;d++){var dx=(Math.random()-.5)*r*2,dy=(Math.random()-.5)*r*2;if(dx*dx+dy*dy<r*r*.88){g.beginPath();g.arc(cx+dx,cy+dy,.5+Math.random()*.4,0,Math.PI*2);g.fillStyle='rgba(0,25,8,0.12)';g.fill();}}
  g.restore();
  sHL(g,cx,cy,r,-.22,-.28,.32,160,230,160,.3);
  sHL(g,cx,cy,r,.15,.2,.5,0,0,0,.08);
  rSt(g,cx,cy,r,'rgba(90,190,110,0.12)',1.5);
}
function dWMI(g,cx,cy,r){
  g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var rim=g.createRadialGradient(cx,cy,r*.82,cx,cy,r);
  rim.addColorStop(0,'#a8d8a0');rim.addColorStop(.4,'#7bc96f');rim.addColorStop(.8,'#4a9e3e');rim.addColorStop(1,'#2d7a25');
  g.fillStyle=rim;g.fill();
  g.beginPath();g.arc(cx,cy,r*.82,0,Math.PI*2);g.fillStyle='#e8f5e0';g.fill();
  g.beginPath();g.arc(cx,cy,r*.76,0,Math.PI*2);
  var f=g.createRadialGradient(cx,cy,0,cx,cy,r*.76);
  f.addColorStop(0,'#ff3b3b');f.addColorStop(.3,'#ef2d2d');f.addColorStop(.7,'#d91e1e');f.addColorStop(1,'#c41515');
  g.fillStyle=f;g.fill();
  g.save();g.beginPath();g.arc(cx,cy,r*.76,0,Math.PI*2);g.clip();
  for(var i=0;i<12;i++){var a=i*Math.PI/6;g.beginPath();g.moveTo(cx,cy);g.lineTo(cx+Math.cos(a)*r*.8,cy+Math.sin(a)*r*.8);g.strokeStyle='rgba(160,20,20,0.12)';g.lineWidth=3;g.stroke();}
  g.restore();
  var sd=[[-8,-5],[6,-8],[0,7],[-10,8],[10,3],[-4,-11],[11,-4],[-7,2],[3,11],[-12,0],[5,11],[0,-9]];
  g.fillStyle='#1a1020';
  for(var i=0;i<sd.length;i++){var sx=sd[i][0]*r/28,sy=sd[i][1]*r/28;if(sx*sx+sy*sy<(r*.65)*(r*.65)){g.save();g.translate(cx+sx,cy+sy);g.rotate(.5+Math.random()*.3);g.beginPath();g.ellipse(0,0,1.5,3.2,0,0,Math.PI*2);g.fill();g.restore();}}
  sHL(g,cx,cy,r*.76,-.15,-.2,.2,255,200,200,.15);
}

/* ===== 橙子 外观 ===== */
function dOGO(g,cx,cy,r){
  dSh(g,cx,cy,r);
  g.save();g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var bg=g.createRadialGradient(cx-r*.25,cy-r*.25,r*.05,cx+r*.1,cy+r*.15,r);
  bg.addColorStop(0,'#ffb347');bg.addColorStop(.3,'#f97316');bg.addColorStop(.7,'#e05e0c');bg.addColorStop(1,'#c2410c');
  g.fillStyle=bg;g.fill();g.clip();
  for(var d=0;d<60;d++){var dx=(Math.random()-.5)*r*2,dy=(Math.random()-.5)*r*2;if(dx*dx+dy*dy<r*r*.85){g.beginPath();g.arc(cx+dx,cy+dy,.8+Math.random()*.5,0,Math.PI*2);g.strokeStyle='rgba(180,80,10,0.15)';g.lineWidth=.6;g.stroke();}}
  g.beginPath();g.arc(cx,cy+r*.72,3.5,0,Math.PI*2);g.fillStyle='rgba(160,60,5,0.35)';g.fill();
  g.beginPath();g.arc(cx,cy+r*.72,2,0,Math.PI*2);g.fillStyle='rgba(200,100,20,0.2)';g.fill();
  g.restore();
  sHL(g,cx,cy,r,-.2,-.25,.28,255,230,180,.45);
  sHL(g,cx,cy,r,.12,.18,.45,0,0,0,.06);
  rSt(g,cx,cy,r,'rgba(200,120,40,0.15)',1);
  g.save();g.translate(cx,cy-r+1);g.beginPath();g.ellipse(3,-2,5,2.5,.5,0,Math.PI*2);g.fillStyle='#22c55e';g.fill();g.strokeStyle='rgba(21,128,61,0.4)';g.lineWidth=.6;g.stroke();g.restore();
}
function dOGI(g,cx,cy,r){
  g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.fillStyle='#f5f0e0';g.fill();
  g.beginPath();g.arc(cx,cy,r*.88,0,Math.PI*2);
  var f=g.createRadialGradient(cx,cy,0,cx,cy,r*.88);
  f.addColorStop(0,'#fdba74');f.addColorStop(.5,'#fb923c');f.addColorStop(1,'#f97316');
  g.fillStyle=f;g.fill();
  g.save();g.beginPath();g.arc(cx,cy,r*.88,0,Math.PI*2);g.clip();
  for(var i=0;i<10;i++){var a=i*Math.PI*2/10;g.beginPath();g.moveTo(cx+Math.cos(a)*5,cy+Math.sin(a)*5);g.lineTo(cx+Math.cos(a)*r*.9,cy+Math.sin(a)*r*.9);g.strokeStyle='rgba(255,255,255,0.35)';g.lineWidth=1.5;g.stroke();}
  for(var i=0;i<10;i++){var am=(i+.5)*Math.PI*2/10;for(var j=0;j<4;j++){var t=.3+j*.17;g.beginPath();g.arc(cx+Math.cos(am)*r*.88*t,cy+Math.sin(am)*r*.88*t,1.2,0,Math.PI*2);g.fillStyle='rgba(255,255,255,0.2)';g.fill();}}
  g.restore();
  g.beginPath();g.arc(cx,cy,4,0,Math.PI*2);g.fillStyle='rgba(255,255,255,0.4)';g.fill();
}

/* ===== 苹果 外观 ===== */
function dAPO(g,cx,cy,r){
  dSh(g,cx,cy,r);
  g.save();g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var bg=g.createRadialGradient(cx-r*.3,cy-r*.25,r*.05,cx+r*.15,cy+r*.15,r);
  bg.addColorStop(0,'#f87171');bg.addColorStop(.25,'#ef4444');bg.addColorStop(.6,'#dc2626');bg.addColorStop(1,'#b91c1c');
  g.fillStyle=bg;g.fill();g.clip();
  var yg=g.createRadialGradient(cx,cy-r*.6,0,cx,cy-r*.6,r*.7);
  yg.addColorStop(0,'rgba(250,204,21,0.2)');yg.addColorStop(1,'rgba(250,204,21,0)');
  g.fillStyle=yg;g.fillRect(cx-r,cy-r,r*2,r*2);
  for(var i=-4;i<=4;i++){g.beginPath();g.moveTo(cx+i*5,cy-r);g.bezierCurveTo(cx+i*5+1,cy-r*.3,cx+i*5-1,cy+r*.3,cx+i*5,cy+r);g.strokeStyle='rgba(180,30,30,0.12)';g.lineWidth=1.5;g.stroke();}
  g.restore();
  sHL(g,cx,cy,r,-.2,-.3,.25,255,200,200,.5);
  sHL(g,cx,cy,r,.15,.2,.4,0,0,0,.07);
  rSt(g,cx,cy,r,'rgba(200,80,80,0.1)',1);
  g.save();g.translate(cx-1,cy-r+2);g.beginPath();g.moveTo(0,0);g.quadraticCurveTo(2,-5,1,-11);g.strokeStyle='#6b3a1f';g.lineWidth=2.8;g.lineCap='round';g.stroke();
  g.beginPath();g.moveTo(.5,-1);g.quadraticCurveTo(2.5,-5,1.5,-10);g.strokeStyle='rgba(160,120,80,0.3)';g.lineWidth=1;g.stroke();g.restore();
  g.save();g.translate(cx+6,cy-r-2);g.beginPath();g.moveTo(0,0);g.bezierCurveTo(4,-4,10,-5,12,-2);g.bezierCurveTo(10,0,4,2,0,0);g.fillStyle='#22c55e';g.fill();
  g.beginPath();g.moveTo(1,0);g.quadraticCurveTo(6,-2.5,10,-1.5);g.strokeStyle='rgba(21,128,61,0.5)';g.lineWidth=.7;g.stroke();
  g.beginPath();g.moveTo(4,-.5);g.lineTo(6,-2.5);g.stroke();
  g.beginPath();g.moveTo(6,-.8);g.lineTo(8,-2.5);g.stroke();g.restore();
}
function dAPI(g,cx,cy,r){
  g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var f=g.createRadialGradient(cx,cy,0,cx,cy,r);
  f.addColorStop(0,'#fef9ee');f.addColorStop(.5,'#fef3cd');f.addColorStop(.8,'#fde68a');f.addColorStop(1,'#fcd34d');
  g.fillStyle=f;g.fill();
  g.save();g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.clip();
  g.beginPath();g.moveTo(cx-7,cy-r*.6);g.bezierCurveTo(cx-9,cy-.2*r,cx-8,cy+.3*r,cx,cy+r*.5);g.bezierCurveTo(cx+8,cy+.3*r,cx+9,cy-.2*r,cx+7,cy-r*.6);g.closePath();
  g.fillStyle='rgba(255,240,200,0.5)';g.fill();g.strokeStyle='rgba(200,160,80,0.2)';g.lineWidth=.8;g.stroke();
  var sd=[[-3,-2],[3,-2],[-2,4],[2,4]];
  for(var i=0;i<sd.length;i++){g.save();g.translate(cx+sd[i][0],cy+sd[i][1]);g.rotate(sd[i][0]<0?-.3:.3);g.beginPath();g.ellipse(0,0,1.2,2.8,0,0,Math.PI*2);g.fillStyle='#78350f';g.fill();g.restore();}
  g.restore();
  sHL(g,cx,cy,r,-.1,-.15,.2,255,255,240,.1);
}

/* ===== 猕猴桃 外观 ===== */
function dKIO(g,cx,cy,r){
  dSh(g,cx,cy,r);
  g.save();g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var bg=g.createRadialGradient(cx-r*.25,cy-r*.25,r*.05,cx+r*.1,cy+r*.15,r);
  bg.addColorStop(0,'#b8860b');bg.addColorStop(.3,'#92690a');bg.addColorStop(.7,'#7a5508');bg.addColorStop(1,'#5c3d06');
  g.fillStyle=bg;g.fill();g.clip();
  for(var d=0;d<80;d++){var dx=(Math.random()-.5)*r*2,dy=(Math.random()-.5)*r*2;if(dx*dx+dy*dy<r*r*.9){var an=Math.random()*Math.PI*2,ln=1+Math.random()*2;g.beginPath();g.moveTo(cx+dx,cy+dy);g.lineTo(cx+dx+Math.cos(an)*ln,cy+dy+Math.sin(an)*ln);g.strokeStyle='rgba(100,70,20,0.25)';g.lineWidth=.4;g.stroke();}}
  g.restore();
  sHL(g,cx,cy,r,-.2,-.25,.25,200,180,140,.3);
  sHL(g,cx,cy,r,.12,.18,.4,0,0,0,.06);
  rSt(g,cx,cy,r,'rgba(140,100,40,0.12)',1);
}
function dKII(g,cx,cy,r){
  g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.fillStyle='#8B7355';g.fill();
  g.beginPath();g.arc(cx,cy,r*.9,0,Math.PI*2);g.fillStyle='#c4a882';g.fill();
  g.beginPath();g.arc(cx,cy,r*.88,0,Math.PI*2);
  var f=g.createRadialGradient(cx,cy,0,cx,cy,r*.88);
  f.addColorStop(0,'#a7f3a0');f.addColorStop(.2,'#6ee76e');f.addColorStop(.6,'#4ade4a');f.addColorStop(1,'#22c522');
  g.fillStyle=f;g.fill();
  g.save();g.beginPath();g.arc(cx,cy,r*.88,0,Math.PI*2);g.clip();
  for(var i=0;i<16;i++){var a=i*Math.PI*2/16;g.beginPath();g.moveTo(cx+Math.cos(a)*r*.12,cy+Math.sin(a)*r*.12);g.lineTo(cx+Math.cos(a)*r*.9,cy+Math.sin(a)*r*.9);g.strokeStyle='rgba(255,255,255,0.18)';g.lineWidth=1;g.stroke();}
  var rr=[r*.35,r*.55,r*.72],cn=[8,12,16];
  for(var ring=0;ring<3;ring++){for(var i=0;i<cn[ring];i++){var a=i*Math.PI*2/cn[ring]+ring*.15;g.save();g.translate(cx+Math.cos(a)*rr[ring],cy+Math.sin(a)*rr[ring]);g.rotate(a+Math.PI/2);g.beginPath();g.ellipse(0,0,1,2,0,0,Math.PI*2);g.fillStyle='#1a1a1a';g.fill();g.restore();}}
  g.restore();
  g.beginPath();g.arc(cx,cy,r*.1,0,Math.PI*2);g.fillStyle='rgba(255,255,255,0.45)';g.fill();
  g.beginPath();g.arc(cx,cy,r*.05,0,Math.PI*2);g.fillStyle='rgba(255,255,255,0.6)';g.fill();
}

/* ===== 柠檬 外观 ===== */
function dLMO(g,cx,cy,r){
  dSh(g,cx,cy,r);
  g.save();g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);
  var bg=g.createRadialGradient(cx-r*.2,cy-r*.2,r*.05,cx+r*.1,cy+r*.15,r);
  bg.addColorStop(0,'#fde68a');bg.addColorStop(.3,'#facc15');bg.addColorStop(.7,'#eab308');bg.addColorStop(1,'#ca8a04');
  g.fillStyle=bg;g.fill();g.clip();
  for(var d=0;d<40;d++){var dx=(Math.random()-.5)*r*2,dy=(Math.random()-.5)*r*2;if(dx*dx+dy*dy<r*r*.88){g.beginPath();g.arc(cx+dx,cy+dy,.5+Math.random()*.3,0,Math.PI*2);g.fillStyle='rgba(160,120,10,0.12)';g.fill();}}
  g.restore();
  g.beginPath();g.ellipse(cx,cy-r+4,4.5,3,0,0,Math.PI*2);g.fillStyle='#d4a80a';g.fill();

/* ===== 更新 ===== */
function upd(dt){
  if(gs!=='playing')return;
  gt+=dt;bgT+=dt;if(ivT>0)ivT-=dt;updTm();
  var nl=Math.floor(gt/10);if(nl>df){df=nl;spI=Math.max(.3,spI-.11);}
  spT+=dt;if(spT>=spI){spT-=spI;var n=df>=2?Math.floor(rand(1,2.5)):1;for(var i=0;i<n;i++)fr.push(crF());}
  for(var i=fr.length-1;i>=0;i--){var f=fr[i];f.age+=dt;f.vy+=GR*dt;f.x+=f.vx*dt;f.y+=f.vy*dt;if(f.y>H+50){if(ivT<=0){lv--;updHUD();fr.splice(i,1);if(lv<=0){endG();return;}}else{fr.splice(i,1);}}}
  for(var i=hf.length-1;i>=0;i--){var s=hf[i];s.age+=dt;s.vy+=GR*dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.rot+=s.av*dt;s.a-=dt*1.6;if(s.a<=0||s.y>H+120)hf.splice(i,1);}
  for(var i=fl.length-1;i>=0;i--){fl[i].life-=dt;if(fl[i].life<=0)fl.splice(i,1);}
  for(var i=pt.length-1;i>=0;i--){var p=pt[i];p.life-=dt;p.vy+=GR*.65*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.life<=0)pt.splice(i,1);}
  for(var i=sp.length-1;i>=0;i--){sp[i].age+=dt;if(sp[i].age>=sp[i].ma)sp.splice(i,1);}
  for(var i=tr.length-1;i>=0;i--){tr[i].life-=dt;if(tr[i].life<=0)tr.splice(i,1);}
}

/* ===== 渲染 ===== */
function ren(){
  ctx.clearRect(0,0,W,H);drBG();
  for(var i=0;i<fr.length;i++)drFr(fr[i]);
  for(var i=0;i<hf.length;i++)drHf(hf[i]);
  drFl();drPt();drSp();drTr();
  if(ivT>0){ctx.fillStyle='rgba(139,92,246,'+((.08+Math.sin(bgT*8)*.04).toFixed(3))+')';ctx.fillRect(0,0,W,H);}
}
function drBG(){
  var bg=ctx.createRadialGradient(W/2,H*.45,10,W/2,H*.4,H*.95);
  bg.addColorStop(0,'#1a1040');bg.addColorStop(.35,'#0f172a');bg.addColorStop(1,'#020617');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(var i=0;i<stars.length;i++){var s=stars[i],a=.3+Math.sin(bgT*s.sp+s.o)*.3;ctx.beginPath();ctx.arc(s.x,s.y,Math.max(.3,s.r),0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.fill();}
  var g1=ctx.createRadialGradient(W/2,H*1.02,0,W/2,H*1.02,W*.6);
  g1.addColorStop(0,'rgba(139,92,246,0.06)');g1.addColorStop(1,'rgba(139,92,246,0)');
  ctx.fillStyle=g1;ctx.fillRect(0,H*.5,W,H*.5);
  var g2=ctx.createRadialGradient(0,0,0,0,0,W*.5);
  g2.addColorStop(0,'rgba(251,191,36,0.05)');g2.addColorStop(1,'rgba(251,191,36,0)');
  ctx.fillStyle=g2;ctx.fillRect(0,0,W*.5,H*.5);
}
function drFr(f){var c=fC[f.ii];if(!c)return;ctx.save();ctx.globalAlpha=f.a;ctx.drawImage(c,f.x-c.width/2,f.y-c.height/2);ctx.restore();}
function drHf(o){
  var r=Math.max(1,o.r);
  ctx.save();ctx.globalAlpha=clamp(o.a,0,1);
  ctx.translate(o.x,o.y);ctx.rotate(o.rot);ctx.rotate(-o.ca);
  ctx.beginPath();
  if(o.side===0)ctx.arc(0,0,r,Math.PI,2*Math.PI);
  else ctx.arc(0,0,r,0,Math.PI);
  ctx.closePath();ctx.clip();
  var src=o.side===0?fC[o.ii]:iC[o.ii];
  if(src)ctx.drawImage(src,-src.width/2,-src.height/2);
  ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(0,r);
  ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=2;ctx.stroke();
  ctx.restore();
}
function drFl(){
  for(var i=0;i<fl.length;i++){
    var f=fl[i],a=clamp(f.life/f.max,0,1);
    ctx.save();ctx.globalAlpha=a;ctx.translate(f.x,f.y);ctx.rotate(f.angle);
    var g=ctx.createLinearGradient(-f.length,0,f.length,0);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(.15,'rgba(255,255,255,0.8)');
    g.addColorStop(.5,'rgba(255,255,255,1)');g.addColorStop(.85,'rgba(255,255,255,0.8)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=g;ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-f.length,0);ctx.lineTo(f.length,0);ctx.stroke();
    ctx.shadowColor='rgba(255,255,255,0.8)';ctx.shadowBlur=10;
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-f.length*.5,0);ctx.lineTo(f.length*.5,0);ctx.stroke();
    ctx.restore();
  }
}
function drPt(){
  for(var i=0;i<pt.length;i++){
    var p=pt[i],a=clamp(p.life/p.max,0,1);
    ctx.save();ctx.globalAlpha=a;ctx.shadowColor=p.color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.r),0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();ctx.restore();
  }
}
function drSp(){
  for(var i=0;i<sp.length;i++){
    var s=sp[i],pr=s.age/s.ma,a=1-pr;
    var sc=Math.min(1,s.age*8);
    ctx.save();ctx.globalAlpha=a;
    ctx.font='bold '+Math.floor(20*sc)+'px system-ui';ctx.textAlign='center';
    ctx.shadowColor=s.color;ctx.shadowBlur=10;
    ctx.fillStyle=s.color;
    ctx.fillText(s.text,s.x,s.y-s.age*55);
    ctx.restore();
  }
}
function drTr(){
  if(tr.length<2)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowColor='rgba(239,68,68,0.7)';ctx.shadowBlur=14;
  ctx.strokeStyle='rgba(239,68,68,0.8)';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(tr[0].x,tr[0].y);
  for(var i=1;i<tr.length;i++){ctx.globalAlpha=clamp(tr[i].life/TL,0,1);ctx.lineTo(tr[i].x,tr[i].y);}
  ctx.globalAlpha=1;ctx.stroke();
  ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.6;
  ctx.beginPath();ctx.moveTo(tr[0].x,tr[0].y);
  for(var i=1;i<tr.length;i++){ctx.globalAlpha=clamp(tr[i].life/TL,0,1);ctx.lineTo(tr[i].x,tr[i].y);}
  ctx.globalAlpha=1;ctx.stroke();
  ctx.restore();
}

/* ===== 循环 ===== */
function loop(ts){
  if(gs==='over'||gs==='menu')return;
  var dt=Math.min((ts-lt)/1000,.1);lt=ts;
  upd(dt);ren();requestAnimationFrame(loop);
}

/* ===== 启动 ===== */
ldHS();resize();initFC();genScores();ren();
</script>
